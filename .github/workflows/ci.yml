name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            configure_preset: conan-default
            build_preset: conan-release
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            configure_preset: conan-release
            build_preset: conan-release
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            configure_preset: conan-release
            build_preset: conan-release
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install Conan
      run: python -m pip install "conan>=2,<3"

    - name: Detect Conan profile
      env:
        CC: ${{ matrix.os == 'ubuntu-latest' && matrix.c_compiler || '' }}
        CXX: ${{ matrix.os == 'ubuntu-latest' && matrix.cpp_compiler || '' }}
      run: conan profile detect --force

    - name: Install Conan dependencies
      env:
        CC: ${{ matrix.os == 'ubuntu-latest' && matrix.c_compiler || '' }}
        CXX: ${{ matrix.os == 'ubuntu-latest' && matrix.cpp_compiler || '' }}
      run: >
        conan install ${{ github.workspace }}
        --build=missing
        -s build_type=${{ matrix.build_type }}

    - name: Configure CMake
      run: cmake --preset ${{ matrix.configure_preset }}

    - name: Build
      run: cmake --build --preset ${{ matrix.build_preset }}

    - name: Test
      run: ctest --preset ${{ matrix.build_preset }}
